spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: ${POSTGRESQL_ROOT}
    password: ${POSTGRESQL_PASSWORD}
    driver-class-name: org.postgresql.Driver

  boot:
    admin:
      client:
        url: ${SPRING_BOOT_ADMIN_CLIENT_URL}

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: discodeit
        format_sql: false
        highlight_sql: false
        use_sql_comments: false
    show-sql: false

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-prod.sql

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

info:
  config:
    datasource:
      url: "PROTECTED"
    jpa:
      ddl-auto: "PROTECTED"
    storage:
      path: "PROTECTED"