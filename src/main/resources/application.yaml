spring:
  application:
    name: discodeit
  boot:
    admin:
      client:
        instance:
          name: discodeit
  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100 # global
    show-sql: false # logging이랑 겹침.
    open-in-view: false # PC를 언제까지 유지할지 결정. (transaction or view)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  cache:
    type: caffeine
    cache-names:
      - channels
      - notifications
      - users
    caffeine:
      spec: >
        maximumSize=100,
        expireAfterAccess=600s,
        recordStats

# actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers, caches
  endpoint:
    health:
      show-details: always
    caches:
      access: unrestricted
  info:
    env:
      enabled: true
  observations:
    annotations:
      enabled: true

# custom
discodeit:
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:./uploads}
    s3:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket: ${AWS_S3_BUCKET}
      expiration-duration-in-minutes: ${AWS_S3_PRESIGNED_URL_EXPIRATION_MINUTES:60}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    root: info

jwt:
  access-token:
    secret: ${AT_SECRET}
    expiration: 900000
  refresh-token:
    secret: ${RT_SECRET}
    expiration: 3600000

admin:
  email: ${ADMIN_EMAIL}
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

info:
  app:
    name: Discodeit
    version: 1.7.0
    java-version: 17
    spring-boot-version: 3.5.9
  config:
    datasource:
      url: ${spring.datasource.url}
      driver-class-name: ${spring.datasource.driver-class-name}
    jpa:
      ddl-auto: ${spring.jpa.hibernate.ddl-auto}
    storage:
      type: local
      path: ${discodeit.storage.local.root-path}
    multipart:
      max-file-size: ${spring.servlet.multipart.max-file-size:10MB}
      max-request-size: ${spring.servlet.multipart.max-request-size:30MB}